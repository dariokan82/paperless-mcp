name: Docker Publish
on:
  push:
    branches:
      - main
  workflow_call:
    inputs:
      versionTag:
        required: false
        type: string
  pull_request:
    branches:
      - master
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Check if PR is from fork
        id: check-fork
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "${{ github.event.pull_request.head.repo.full_name }}" != "${{ github.repository }}" ]; then
              echo "is_fork=true" >> $GITHUB_OUTPUT
            else
              echo "is_fork=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "is_fork=false" >> $GITHUB_OUTPUT
          fi
      - name: Log in to GitHub Container Registry
        if: steps.check-fork.outputs.is_fork == 'false'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Set semver and latest tags if release
        id: tagmeta
        run: |
          if [ "${{ github.event_name }}" = "workflow_call" ] || [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "LATEST=type=raw,value=latest" >> $GITHUB_OUTPUT
          else
            echo "LATEST=" >> $GITHUB_OUTPUT
          fi

          if [ "${{ github.event_name }}" = "workflow_call" ]; then
            echo "SEMVER=type=semver,pattern=${{ inputs.versionTag }}" >> $GITHUB_OUTPUT
          else
            echo "SEMVER=" >> $GITHUB_OUTPUT
          fi
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=pr
            type=sha
            ${{ steps.tagmeta.outputs.SEMVER }}
            ${{ steps.tagmeta.outputs.LATEST }}
      - name: Build (linux/amd64) for smoke test
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: false
          load: true
          tags: paperless-mcp:smoke
          cache-from: type=gha,scope=paperless-mcp-docker
          cache-to: type=gha,scope=paperless-mcp-docker,mode=max
      - name: Smoke test container
        run: |
          docker rm -f paperless-mcp-smoke 2>/dev/null || true
          docker run -d --name paperless-mcp-smoke \
            -e PAPERLESS_URL=http://example.test \
            -e PAPERLESS_API_KEY=ci-smoke-token \
            -p 3000:3000 \
            paperless-mcp:smoke
          for i in $(seq 1 30); do
            code=$(curl -s --max-time 2 -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/mcp || true)
            if [ "$code" = "405" ]; then
              echo "Smoke OK: GET /mcp returned 405"
              docker rm -f paperless-mcp-smoke
              exit 0
            fi
            sleep 1
          done
          echo "Timeout waiting for 405 from GET /mcp"
          docker logs paperless-mcp-smoke || true
          docker rm -f paperless-mcp-smoke
          exit 1
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: ${{ steps.check-fork.outputs.is_fork == 'false' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=paperless-mcp-docker
          cache-to: type=gha,scope=paperless-mcp-docker,mode=max
